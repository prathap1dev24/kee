<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Key Shops — Search Keys Card: Icon Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --maroon:#7A1220; --maroon-dark:#5A0D18; --gold:#C89416; --gold-2:#F5B800;
    --bg:#FAF6EE; --card:#ffffff; --card-2:#FBF2DA; --line:#E7E1D2;
    --text-1:#221D16; --text-2:#736553; --text-3:#8A7A63;
    --teal:#12B8B0;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:#EDE7DA; font-family:'Inter',sans-serif; padding:40px 20px;}
  h1,h2,h3{font-family:'Outfit',sans-serif; margin:0;}
  .wrap{max-width:1000px; margin:0 auto;}
  .hdr{margin-bottom:28px;}
  .hdr h1{font-size:22px; color:var(--maroon); margin-bottom:6px;}
  .hdr p{font-size:13.5px; color:var(--text-2); font-weight:600;}
  .grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:16px;}
  @media (max-width:900px){ .grid{grid-template-columns:repeat(3, 1fr);} }
  @media (max-width:600px){ .grid{grid-template-columns:repeat(2, 1fr);} }

  .opt{position:relative;}
  .num-badge{position:absolute; top:-10px; left:-10px; width:26px; height:26px; border-radius:8px; background:var(--maroon); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Outfit'; font-weight:800; font-size:12.5px; box-shadow:0 6px 14px rgba(122,18,32,.35); z-index:2;}
  .dash-card{
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:5px;
    background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:10px;
    box-shadow:0 20px 40px rgba(30,41,59,0.1), 0 2px 6px rgba(30,41,59,0.06);
  }
  .icon-badge{
    width:100%; height:110px; border-radius:14px;
    background:var(--card-2); display:flex; align-items:center; justify-content:center;
    color:var(--teal);
  }
  .icon-badge svg{width:44px; height:44px; stroke-width:1.8;}
  .dash-card-title{font-family:'Outfit'; font-weight:800; color:var(--text-1); font-size:12.5px;}
  .dash-card-desc{font-size:10px; color:var(--text-2); font-weight:600;}
  .icon-name{margin-top:6px; text-align:center; font-size:10.5px; color:var(--text-3); font-weight:700; font-family:monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Search Keys — Icon Options</h1>
    <p>10 candidate icons for the Dashboard "Search Keys" card, shown at production size/style. Reply with the number you want.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
  const options = [
    { n: 1, icon: 'key-round',    name: 'key-round' },
    { n: 2, icon: 'key-square',   name: 'key-square' },
    { n: 3, icon: 'scan-search',  name: 'scan-search' },
    { n: 4, icon: 'search-check', name: 'search-check' },
    { n: 5, icon: 'fingerprint',  name: 'fingerprint' },
    { n: 6, icon: 'file-search',  name: 'file-search' },
    { n: 7, icon: 'list-filter',  name: 'list-filter' },
    { n: 8, icon: 'radar',        name: 'radar' },
    { n: 9, icon: 'crosshair',    name: 'crosshair' },
    { n: 10, icon: 'compass',     name: 'compass' },
  ];

  const grid = document.getElementById('grid');
  options.forEach(opt => {
    const el = document.createElement('div');
    el.className = 'opt';
    el.innerHTML = `
      <div class="num-badge">${opt.n}</div>
      <div class="dash-card">
        <div class="icon-badge"><i data-lucide="${opt.icon}"></i></div>
        <div class="dash-card-title">Search Keys</div>
        <div class="dash-card-desc">Find and digitize key records quickly</div>
      </div>
      <div class="icon-name">${opt.name}</div>
    `;
    grid.appendChild(el);
  });

  lucide.createIcons();
</script>
</body>
</html>
